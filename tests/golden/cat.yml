  1 -
  begin
      1 + DUP @ 255 &
      DUP 0 !=
      if
          DUP emit
      then
      0 =
  until
   ;
  CREATE inpt 30
  SWAP
  1 -
  begin
      1 +
      DUP key SWAP ! DUP  @ 255 & 0 =
  until
  inpt
  print_word
