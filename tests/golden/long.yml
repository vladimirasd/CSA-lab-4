in_source: |
  : long_plus       \ a_lo a_hi b_lo b_hi
      ROT +          \ a_lo b_lo sum_h'
      SWAP ROT        \ sum_h' b_lo a_lo
      DUP ROT  +       \ sum_h' b_lo sum_lo
      DUP ROT           \ sum_h' sum_lo sum_lo b_lo
      U>                 \ sum_h' sum_lo carry
      ROT                 \  sum_lo carry sum_h'
      +                    \ sum_lo  sum_h
  ;
  4294967295 1 2 1 long_plus . .
