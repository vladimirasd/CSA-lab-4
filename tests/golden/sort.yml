in_source: |
  VARIABLE len
  VARIABLE cur_addr
  VARIABLE next_addr

  : read_int
      key 255 & key 255 & key 255 & key 255 & 256 * + 256 * + 256 * +
  ;

  CREATE array 1000
  DROP
  read_int DUP len !
  0
  do
      DUP I 4 * + read_int DUP . SWAP !
      1
  loop

  array len @
  1 -
  0
  do
      DUP I 4 * + cur_addr !
      len @ I
      do
          DUP I 4 * + next_addr !
          cur_addr @ @
          next_addr @ @
          <
          if
              cur_addr @ @
              next_addr @ @
              cur_addr @ !
              next_addr @ !
          then
      1
      loop
  1
  loop

  10 emit

  array len @
  0
  do
      DUP I 4 * + @ .
      1
  loop
  DROP
